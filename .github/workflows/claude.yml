name: Claude Code Assistant



on:

  issues:

    types: [opened, labeled]

  issue_comment:

    types: [created]

  pull_request_review_comment:

    types: [created]



jobs:

  claude:

    if: |

      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||

      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||

      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    runs-on: ubuntu-latest

    permissions:

      contents: write

      issues: write

      pull-requests: write

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      - name: Set up Node.js

        uses: actions/setup-node@v4

        with:

          node-version: '20'

          cache: 'npm'



      - name: Install dependencies

        run: npm ci



      - name: Read CLAUDE.md context

        id: context

        run: |

          if [ -f CLAUDE.md ]; then

            echo "context_exists=true" >> $GITHUB_OUTPUT

            echo "## CLAUDE.md loaded successfully" >> $GITHUB_STEP_SUMMARY

          else

            echo "context_exists=false" >> $GITHUB_OUTPUT

            echo "## Warning: CLAUDE.md not found" >> $GITHUB_STEP_SUMMARY

          fi



      - name: Run Claude Code

        id: claude

        uses: anthropics/claude-code-action@beta

        with:

          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          model: claude-sonnet-4-20250514

          max_turns: 25

          timeout_minutes: 30

          allowed_tools: |

            Bash

            Read

            Write

            Edit

            MultiEdit

            TodoRead

            TodoWrite

          system_prompt: |

            You are working on the NLT Observatory project.

            ALWAYS read CLAUDE.md first for full project context.

            

            Key rules:

            - This is a thin client GitHub Pages site (React + Vite + MapLibre GL)

            - All data is static JSON in public/data/

            - Design system: dark theme, DM Sans font, glassmorphism, indigo accents

            - Never introduce AWS dependencies

            - Test builds with: npm run build

            - The site deploys automatically via .github/workflows/deploy.yml

            

            When completing work:

            1. Read the issue requirements carefully

            2. Read CLAUDE.md for project context

            3. Make code changes

            4. Run npm run build to verify

            5. Commit with descriptive message referencing the issue number

            6. Update CLAUDE.md session history if significant changes made



      - name: Post result comment

        if: always()

        uses: actions/github-script@v7

        with:

          script: |

            const conclusion = '${{ steps.claude.outcome }}';

            const issueNumber = context.issue?.number || context.payload.issue?.number;

            if (!issueNumber) return;

            

            const emoji = conclusion === 'success' ? '✅' : '❌';

            const status = conclusion === 'success' ? 'completed' : 'failed';

            

            await github.rest.issues.createComment({

              owner: context.repo.owner,

              repo: context.repo.repo,

              issue_number: issueNumber,

              body: `${emoji} Claude Code ${status} this task.\n\n` +

                    `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +

                    `**Triggered by:** @${context.actor}`

            });

